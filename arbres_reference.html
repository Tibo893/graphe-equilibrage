<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbres de référence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0b0d17; --bg2:#12141f; --bg3:#191c2e;
    --border:rgba(100,130,255,0.12); --border2:rgba(100,130,255,0.25);
    --text:#dce4f5; --muted:#6070a0;
    --accent:#ff6b35; --blue:#4a90d9;
    --green:#c8f080; --green-bg:#1a3a20;
    --red:#f07070;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}

  header{position:relative;z-index:2;padding:28px 40px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap;}
  header h1{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;}
  header h1 span{color:var(--accent);}
  header p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;}

  .nav{position:relative;z-index:2;padding:14px 40px 0;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
  .tab{padding:6px 14px 8px;border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;background:var(--bg2);color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;transition:color .15s,background .15s,border-color .15s;user-select:none;}
  .tab:hover{color:var(--text);background:var(--bg3);}
  .tab.active{background:var(--bg3);color:var(--accent);border-color:var(--border2);border-bottom-color:var(--bg3);}
  .tab.modified{color:var(--green);}
  .tab.modified.active{color:var(--green);}

  .main{position:relative;z-index:1;padding:28px 40px;display:flex;align-items:flex-start;gap:28px;flex-wrap:wrap;}
  .main.hidden{display:none;}

  /* ── Graph panel ── */
  .graph-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 16px 14px;flex:1;min-width:280px;max-width:480px;box-shadow:0 0 40px rgba(0,0,0,.4);animation:fadeIn .22s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .g-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .g-title::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .g-title .modified-badge{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(200,240,128,0.12);border:1px solid var(--green);color:var(--green);margin-left:4px;letter-spacing:.5px;}
  #svg-container svg{display:block;width:100%;height:auto;}
  #svg-container .node-hit{transition:opacity .1s;}
  #svg-container .node-hit:hover{opacity:.7;}

  /* ── Side panel ── */
  .info-panel{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:9px;}
  .info-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
  .ic-title{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

  /* Operation panel */
  .op-panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
  .op-panel .ic-title{margin-bottom:8px;}
  .sel-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.6;min-height:32px;margin-bottom:8px;}
  .sel-info em{color:var(--text);font-style:normal;}
  .sel-info .ok{color:var(--green);} .sel-info .ko{color:var(--red);}
  .btn-row{display:flex;gap:5px;margin-bottom:5px;}
  .btn{flex:1;padding:7px 0;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;}
  .btn:hover{background:var(--bg2);border-color:rgba(100,130,255,.4);}
  .btn.primary{background:rgba(200,240,128,0.15);border-color:var(--green);color:var(--green);}
  .btn.primary:hover{background:rgba(200,240,128,0.25);}
  .btn.primary:disabled{background:var(--bg3);border-color:var(--border);color:var(--muted);cursor:not-allowed;}
  .btn.danger{border-color:var(--red);color:var(--red);}
  .btn.danger:hover{background:rgba(240,112,112,0.1);}
  .btn.reset{border-color:var(--accent);color:var(--accent);}
  .btn.reset:hover{background:rgba(255,107,53,0.1);}

  /* Weight list */
  .weight-list{display:flex;flex-direction:column;gap:3px;}
  .weight-row{display:flex;align-items:center;gap:7px;}
  .weight-row .node-id{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;width:18px;text-align:right;color:var(--muted);}
  .weight-row.root-row .node-id{color:var(--accent);}
  .weight-row.sel-row .node-id{color:var(--green);}
  .bar-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .35s ease;}
  .weight-row.root-row .bar-fill{background:var(--accent);}
  .weight-row.sel-row .bar-fill{background:var(--green);}
  .weight-row .wval{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);width:38px;text-align:right;}

  /* History */
  .hist-list{max-height:110px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;scrollbar-width:thin;}
  .hist-item{font-family:'DM Mono',monospace;font-size:10px;padding:5px 8px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;color:var(--muted);transition:border-color .15s;line-height:1.4;}
  .hist-item:hover{border-color:var(--border2);color:var(--text);}
  .hist-item.active{border-color:var(--green);color:var(--green);}
  .hist-empty{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

  /* Legend */
  .legend{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
  .leg-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:10px;color:var(--muted);}
  .ldot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1.5px solid;}
  .ldot.root{background:#ff6b35;border-color:#ff6b35;}
  .ldot.other{background:#1e2235;border-color:#4a90d9;}
  .ldot.sel{background:#1a3a20;border-color:#c8f080;}
  .ldot.changed{background:#0e2235;border-color:#4a90d9;}

  /* Nav arrows */
  .nav-arrows{display:flex;gap:6px;}
  .arr-btn{flex:1;padding:7px 0;border:1px solid var(--border);border-radius:5px;background:var(--bg3);color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:border-color .15s,background .15s;}
  .arr-btn:hover{border-color:var(--border2);}
  .arr-btn:disabled{opacity:.3;cursor:not-allowed;}

  /* Toast */
  #toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--green);color:#0a1a00;font-family:'DM Mono',monospace;font-size:11px;padding:7px 18px;border-radius:20px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:99;white-space:nowrap;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.err{background:var(--red);color:#fff;}

  /* Grid view */
  .grid-view{display:none;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;padding:28px 40px;position:relative;z-index:1;}
  .grid-view.active{display:grid;}
  .grid-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 10px 8px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;}
  .grid-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4);}
  .grid-card.modified{border-color:rgba(200,240,128,0.3);}
  .gc-title{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:7px;text-transform:uppercase;}
  .gc-title .mod{color:var(--green);margin-left:5px;font-size:9px;}
  .grid-card svg{display:block;width:100%;height:auto;pointer-events:none;}
</style>
</head>
<body>

<header>
  <div><h1>Arbres de <span>référence</span></h1></div>
  <p>10 graphes · BFS depuis sommet 0<br>Cliquer les sommets pour les sélectionner · poids à 3 décimales</p>
</header>

<nav class="nav" id="nav">
  <button class="tab active" data-view="single" onclick="setView('single')">Vue détaillée</button>
  <button class="tab" data-view="grid" onclick="setView('grid')">Vue grille</button>
  <div style="flex:1"></div>
  <button class="tab" id="gtab0" onclick="showGraph(0)">1</button><button class="tab" id="gtab1" onclick="showGraph(1)">2</button><button class="tab" id="gtab2" onclick="showGraph(2)">3</button><button class="tab" id="gtab3" onclick="showGraph(3)">4</button><button class="tab" id="gtab4" onclick="showGraph(4)">5</button><button class="tab" id="gtab5" onclick="showGraph(5)">6</button><button class="tab" id="gtab6" onclick="showGraph(6)">7</button><button class="tab" id="gtab7" onclick="showGraph(7)">8</button><button class="tab" id="gtab8" onclick="showGraph(8)">9</button><button class="tab" id="gtab9" onclick="showGraph(9)">10</button>
</nav>

<div class="main" id="main-view">
  <div class="graph-panel" id="graph-panel">
    <div class="g-title" id="g-title">Arbre 1</div>
    <div id="svg-container"></div>
  </div>
  <div class="info-panel" id="info-panel">

    <!-- Opération -->
    <div class="op-panel">
      <div class="ic-title">Opération · Équilibrage</div>
      <div class="sel-info" id="sel-info">Cliquer les sommets à sélectionner</div>
      <div class="btn-row">
        <button class="btn primary" id="btn-eq" onclick="lancerEq()" disabled>⊕ Équilibrer</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="toutSel()" style="font-size:10px;">Tout</button>
        <button class="btn danger" onclick="desel()" style="font-size:10px;">Effacer</button>
      </div>
      <div class="btn-row" style="margin-top:3px;">
        <button class="btn reset" id="btn-reset" onclick="resetGraph()" disabled>↺ Réinitialiser</button>
      </div>
    </div>

    <!-- Historique -->
    <div class="info-card">
      <div class="ic-title">Historique <span id="hc" style="color:var(--green)"></span></div>
      <div class="hist-list" id="hl"><div class="hist-empty">—</div></div>
    </div>

    <!-- Poids -->
    <div class="info-card">
      <div class="ic-title">Poids</div>
      <div class="weight-list" id="weight-list"></div>
    </div>

    <!-- Légende -->
    <div class="legend">
      <div class="ic-title">Légende</div>
      <div class="leg-item"><span class="ldot root"></span>Sommet 0 (racine)</div>
      <div class="leg-item"><span class="ldot sel"></span>Sélectionné</div>
      <div class="leg-item"><span class="ldot other"></span>Normal</div>
    </div>

    <div class="nav-arrows">
      <button class="arr-btn" id="btn-prev" onclick="navigate(-1)">← Préc.</button>
      <button class="arr-btn" id="btn-next" onclick="navigate(1)">Suiv. →</button>
    </div>
  </div>
</div>

<div class="grid-view" id="grid-view"></div>
<div id="toast"></div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const ADJS          = [[[1], [0, 2, 3, 9], [1, 4, 5], [1], [2, 6, 7], [2], [4, 8], [4], [6], [1]], [[1, 2, 6, 8], [0, 5], [0, 3, 4, 7], [2], [2], [1], [0], [2, 9], [0], [7]], [[1], [0, 2, 7], [1, 3, 4, 8], [2, 6], [2, 5], [4], [3], [1, 9], [2], [7]], [[1, 2, 4, 5, 6], [0], [0, 3], [2, 9], [0, 7], [0], [0], [4, 8], [7], [3]], [[1, 3], [0, 2, 7], [1], [0, 4, 6, 9], [3, 5], [4], [3], [1, 8], [7], [3]], [[1, 6], [0, 2, 3, 7], [1], [1, 4, 5], [3, 8], [3], [0], [1], [4, 9], [8]], [[1], [0, 2, 5, 8], [1, 3, 4], [2], [2, 6], [1, 7], [4], [5, 9], [1], [7]], [[1, 2, 3, 4, 6, 9], [0], [0], [0, 8], [0, 5], [4], [0, 7], [6], [3], [0]], [[1, 6], [0, 2], [1, 3, 8, 9], [2, 4, 7], [3, 5], [4], [0], [3], [2], [2]], [[1, 2], [0, 5], [0, 3, 4], [2, 6, 9], [2], [1, 7], [3], [5, 8], [7], [3]]];
const INIT_WEIGHTS  = [[0.601939, 0.117789, 0.290386, 0.33151, 0.860977, 0.088587, 0.95296, 0.981919, 0.042333, 0.591128], [0.529384, 0.40166, 0.675247, 0.037857, 0.760635, 0.896151, 0.422849, 0.867976, 0.239825, 0.791812], [0.341473, 0.072164, 0.195939, 0.083159, 0.211287, 0.467781, 0.710638, 0.930301, 0.008454, 0.088828], [0.232149, 0.950328, 0.435466, 0.429854, 0.373574, 0.631489, 0.063874, 0.968528, 0.259257, 0.467832], [0.548992, 0.836045, 0.625385, 0.957649, 0.741207, 0.942361, 0.496279, 0.284924, 0.038533, 0.888195], [0.773872, 0.357328, 0.055415, 0.291654, 0.019759, 0.266302, 0.579254, 0.197969, 0.534594, 0.759672], [0.473096, 0.277729, 0.366364, 0.318402, 0.731362, 0.823081, 0.862839, 0.874926, 0.060227, 0.181334], [0.64101, 0.982488, 0.930043, 0.507403, 0.052996, 0.905559, 0.893932, 0.088056, 0.644312, 0.926996], [0.36837, 0.025202, 0.25533, 0.284413, 0.749774, 0.841311, 0.545829, 0.955662, 0.656473, 0.648667], [0.174453, 0.402314, 0.836226, 0.914655, 0.535203, 0.260457, 0.771074, 0.264968, 0.773437, 0.187057]];   // immuable
const N_GRAPHS      = 10;
const N_NODES       = 10;

// ─── State per graph ──────────────────────────────────────────────────────────
const state = Array.from({length: N_GRAPHS}, (_, gi) => ({
  poids:      [...INIT_WEIGHTS[gi]],
  snapshots:  [{poids: [...INIT_WEIGHTS[gi]]}],
  historique: [],
  histIdx:    -1,
  selection:  new Set(),
  changed:    new Set(),
}));

let cur = 0, view = 'single';

// ─── BFS + layout (JS mirror of Python) ───────────────────────────────────────
function bfsTree(adj, N) {
  const parent=Array(N).fill(-1), depth=Array(N).fill(-1), vis=Array(N).fill(false);
  const q=[0]; vis[0]=true; depth[0]=0;
  while(q.length){
    const u=q.shift();
    for(const v of adj[u]) if(!vis[v]){vis[v]=true;parent[v]=u;depth[v]=depth[u]+1;q.push(v);}
  }
  return {parent,depth};
}

function layoutTree(adj, parent, depth, N) {
  const children=Array.from({length:N},()=>[]);
  for(let i=1;i<N;i++) if(parent[i]>=0) children[parent[i]].push(i);
  const leaves=Array(N).fill(0), order=[], q=[0];
  while(q.length){const u=q.shift();order.push(u);for(const c of children[u])q.push(c);}
  for(let k=order.length-1;k>=0;k--){
    const u=order[k];
    leaves[u]=children[u].length?children[u].reduce((s,c)=>s+leaves[c],0):1;
  }
  const xpos=Array(N).fill(0), xstart=Array(N).fill(0);
  for(const u of order){
    let cx=xstart[u];
    for(const c of children[u]){xstart[c]=cx;cx+=leaves[c];}
    xpos[u]=xstart[u]+(leaves[u]-1)/2;
  }
  const maxDepth=Math.max(...depth.filter(d=>d>=0),0);
  return {xpos,children,maxDepth,leaves};
}

function buildSVG(gi, poids, sel, changed) {
  const adj=ADJS[gi], N=N_NODES;
  const {parent,depth}=bfsTree(adj,N);
  const {xpos,maxDepth}=layoutTree(adj,parent,depth,N);
  const W=420, PAD_X=38, PAD_TOP=48, R=17;
  const usable=W-2*PAD_X;
  const valid=Array.from({length:N},(_,i)=>i).filter(i=>depth[i]>=0);
  const xs=valid.map(i=>xpos[i]);
  const minX=Math.min(...xs), maxX=Math.max(...xs), span=Math.max(maxX-minX,1);
  const LH=Math.min(80,Math.max(55,Math.floor(360/Math.max(maxDepth,1))));
  const H=PAD_TOP+maxDepth*LH+55;
  const px=Array(N).fill(0), py=Array(N).fill(0);
  for(let i=0;i<N;i++){
    if(depth[i]<0){px[i]=W/2;py[i]=H-30;continue;}
    px[i]=PAD_X+(xpos[i]-minX)/span*usable;
    py[i]=PAD_TOP+depth[i]*LH;
  }
  const iso=Array.from({length:N},(_,i)=>i).filter(i=>depth[i]<0);
  if(iso.length){const iw=usable/(iso.length+1);iso.forEach((nd,k)=>{px[nd]=PAD_X+iw*(k+1);py[nd]=H-30;});}

  let s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="display:block;width:100%;height:auto;">`;

  // edges
  for(let i=1;i<N;i++){
    if(parent[i]<0)continue;
    const p=parent[i];
    const se=sel.has(i)&&sel.has(p);
    s+=`<line x1="${px[p].toFixed(1)}" y1="${py[p].toFixed(1)}" x2="${px[i].toFixed(1)}" y2="${py[i].toFixed(1)}" stroke="${se?'#ff6b35':'#3a3f5c'}" stroke-width="${se?2:1.4}" stroke-linecap="round"/>`;
  }
  // nodes
  for(let i=0;i<N;i++){
    const isRoot=i===0, isSel=sel.has(i), isCh=changed.has(i);
    let fill,stroke,idCol,wCol;
    if(isRoot){fill='#ff6b35';stroke='#ff6b35';idCol='#fff';wCol='#ffe0d0';}
    else if(isSel){fill='#1a3a20';stroke='#c8f080';idCol='#c8f080';wCol='#a0d060';}
    else if(isCh){fill='#0e2235';stroke='#80d0ff';idCol='#80c0f0';wCol='#4a90d9';}
    else{fill='#1e2235';stroke='#4a90d9';idCol='#c8d8f0';wCol='#7aaed4';}
    const pv=poids[i].toFixed(3);
    if(isRoot)s+=`<circle cx="${px[i].toFixed(1)}" cy="${py[i].toFixed(1)}" r="${R+6}" fill="none" stroke="#ff6b3540" stroke-width="2"/>`;
    if(isSel) s+=`<circle cx="${px[i].toFixed(1)}" cy="${py[i].toFixed(1)}" r="${R+5}" fill="none" stroke="#c8f08030" stroke-width="1.5"/>`;
    s+=`<circle cx="${px[i].toFixed(1)}" cy="${py[i].toFixed(1)}" r="${R}" fill="${fill}" stroke="${stroke}" stroke-width="${isRoot||isSel?2:1}"/>`;
    s+=`<text x="${px[i].toFixed(1)}" y="${(py[i]-4).toFixed(1)}" font-family="DM Mono,monospace" font-size="11" font-weight="600" fill="${idCol}" text-anchor="middle" dominant-baseline="central">${i}</text>`;
    s+=`<text x="${px[i].toFixed(1)}" y="${(py[i]+8).toFixed(1)}" font-family="DM Mono,monospace" font-size="8" fill="${wCol}" text-anchor="middle" dominant-baseline="central">${pv}</text>`;
    s+=`<circle cx="${px[i].toFixed(1)}" cy="${py[i].toFixed(1)}" r="${R}" fill="transparent" class="node-hit" data-node="${i}" style="cursor:pointer"/>`;
  }
  s+=`</svg>`;
  return s;
}

// ─── Connexité BFS ─────────────────────────────────────────────────────────────
function estConnexe(gi, sommets) {
  if(!sommets.length)return true;
  const adj=ADJS[gi], st=new Set(sommets), vis=new Set();
  const dfs=u=>{if(vis.has(u))return;vis.add(u);for(const v of adj[u])if(st.has(v))dfs(v);};
  dfs(sommets[0]);
  return vis.size===st.size;
}

// ─── Render current graph ──────────────────────────────────────────────────────
function renderGraph() {
  const S=state[cur];
  const svgHTML=buildSVG(cur,S.poids,S.selection,S.changed);
  document.getElementById('svg-container').innerHTML=svgHTML;
  // attach click events
  document.querySelectorAll('.node-hit').forEach(el=>{
    el.addEventListener('click',()=>toggleNode(parseInt(el.dataset.node)));
  });
  // title badge
  const isModif=S.historique.length>0&&S.histIdx>=0;
  document.getElementById('g-title').innerHTML=
    `Arbre ${cur+1}${isModif?'<span class="modified-badge">modifié</span>':''}`;
  // tab highlight
  document.querySelectorAll('[id^=gtab]').forEach((t,i)=>{
    t.classList.toggle('active',i===cur);
    const sm=state[i]; const mod=sm.historique.length>0&&sm.histIdx>=0;
    t.classList.toggle('modified',mod&&i!==cur);
  });
  renderWeights();
  renderHist();
  updSel();
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===9;
  // reset btn
  const S2=state[cur];
  document.getElementById('btn-reset').disabled=!(S2.historique.length>0||S2.histIdx>=0);
}

function renderWeights() {
  const S=state[cur], ws=S.poids, maxW=Math.max(...ws);
  document.getElementById('weight-list').innerHTML=ws.map((w,i)=>{
    const isSel=S.selection.has(i);
    return`<div class="weight-row ${i===0?'root-row':''} ${isSel?'sel-row':''}">
      <span class="node-id">${i}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(w/maxW*100).toFixed(1)}%"></div></div>
      <span class="wval">${w.toFixed(3)}</span>
    </div>`;
  }).join('');
}

function renderHist() {
  const S=state[cur], el=document.getElementById('hl'), cnt=document.getElementById('hc');
  if(!S.historique.length){el.innerHTML='<div class="hist-empty">—</div>';cnt.textContent='';return;}
  cnt.textContent=`(${S.historique.length})`;
  let h=`<div class="hist-item ${S.histIdx===-1?'active':''}" onclick="allerInitial()">État initial</div>`;
  S.historique.forEach((op,i)=>{
    h+=`<div class="hist-item ${S.histIdx===i?'active':''}" onclick="allerAEtat(${i})">
      #${i+1} [${op.sommets.join(',')}] → ${op.moy}</div>`;
  });
  el.innerHTML=h;
  el.querySelector('.active')?.scrollIntoView({block:'nearest'});
}

function updSel() {
  const S=state[cur], el=document.getElementById('sel-info'), btn=document.getElementById('btn-eq');
  if(!S.selection.size){el.innerHTML='Cliquer les sommets à sélectionner';btn.disabled=true;return;}
  const a=[...S.selection].sort((a,b)=>a-b);
  const cx=estConnexe(cur,a);
  const m=(a.reduce((s,i)=>s+S.poids[i],0)/a.length).toFixed(4);
  el.innerHTML=`<em>[${a.join(', ')}]</em><br>Moy : <em>${m}</em> ${cx?'<span class="ok">✓ connexe</span>':'<span class="ko">✗ non connexe</span>'}`;
  btn.disabled=!cx;
}

// ─── Opérations ───────────────────────────────────────────────────────────────
function toggleNode(i) {
  const S=state[cur];
  if(S.selection.has(i))S.selection.delete(i);else S.selection.add(i);
  renderGraph();
}
function toutSel() {
  state[cur].selection=new Set(Array.from({length:N_NODES},(_,i)=>i));
  renderGraph();
}
function desel() {state[cur].selection=new Set();renderGraph();}

function lancerEq() {
  const S=state[cur];
  const a=[...S.selection].sort((a,b)=>a-b);
  if(!a.length||!estConnexe(cur,a)){showToast('Non connexe — annulé',true);return;}
  const m=a.reduce((s,i)=>s+S.poids[i],0)/a.length;
  const mRound=Math.round(m*100000)/100000;
  const newP=[...S.poids];
  a.forEach(i=>newP[i]=mRound);
  // truncate future
  if(S.histIdx<S.historique.length-1){
    S.historique=S.historique.slice(0,S.histIdx+1);
    S.snapshots=S.snapshots.slice(0,S.histIdx+2);
  }
  S.historique.push({sommets:[...a],moy:mRound.toFixed(4)});
  S.snapshots.push({poids:[...newP]});
  S.histIdx=S.historique.length-1;
  S.changed=new Set(a);
  S.poids=[...newP];
  S.selection=new Set();
  document.getElementById('btn-reset').disabled=false;
  showToast(`Équilibré : [${a.join(',')}] → ${mRound.toFixed(4)}`);
  renderGraph();
}

function allerAEtat(idx) {
  const S=state[cur];
  S.histIdx=idx; S.poids=[...S.snapshots[idx+1].poids];
  S.selection=new Set(); S.changed=new Set();
  document.getElementById('btn-reset').disabled=false;
  renderGraph();
}
function allerInitial() {
  const S=state[cur];
  S.histIdx=-1; S.poids=[...S.snapshots[0].poids];
  S.selection=new Set(); S.changed=new Set();
  // reset btn only disabled if no history at all
  document.getElementById('btn-reset').disabled=S.historique.length===0;
  renderGraph();
}

function resetGraph() {
  const S=state[cur];
  S.poids=[...INIT_WEIGHTS[cur]];
  S.snapshots=[{poids:[...INIT_WEIGHTS[cur]]}];
  S.historique=[]; S.histIdx=-1;
  S.selection=new Set(); S.changed=new Set();
  document.getElementById('btn-reset').disabled=true;
  showToast('Arbre réinitialisé ↺');
  renderGraph();
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function showGraph(idx){cur=idx;renderGraph();}
function navigate(d){showGraph(Math.max(0,Math.min(9,cur+d)));}

// ─── Vue grille ───────────────────────────────────────────────────────────────
function setView(v) {
  view=v;
  document.querySelectorAll('[data-view]').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  document.querySelectorAll('[id^=gtab]').forEach(t=>t.style.display=v==='single'?'':'none');
  document.getElementById('main-view').classList.toggle('hidden',v==='grid');
  document.getElementById('grid-view').classList.toggle('active',v==='grid');
  if(v==='grid')buildGrid();
}
function buildGrid() {
  const gv=document.getElementById('grid-view');
  gv.innerHTML=Array.from({length:N_GRAPHS},(_,i)=>{
    const S=state[i]; const mod=S.historique.length>0&&S.histIdx>=0;
    const svg=buildSVG(i,S.poids,new Set(),S.changed);
    return`<div class="grid-card ${mod?'modified':''}" onclick="setView('single');showGraph(${i})">
      <div class="gc-title">Arbre ${i+1}${mod?'<span class="mod">●</span>':''}</div>${svg}</div>`;
  }).join('');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastT; function showToast(m,err=false){
  const t=document.getElementById('toast');
  t.textContent=m; t.className=err?'err show':'show';
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='',2600);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('gtab0').classList.add('active');
renderGraph();
</script>
