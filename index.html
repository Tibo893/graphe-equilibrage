<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbres de référence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ───────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0d17; --bg2:#12141f; --bg3:#191c2e;
  --border:rgba(100,130,255,.12); --border2:rgba(100,130,255,.28);
  --text:#dce4f5; --muted:#5a6890;
  --orange:#ff6b35; --blue:#4a90d9;
  --green:#c8f080; --green-dim:rgba(200,240,128,.15);
  --red:#f07070;
  --r:8px;
}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  display:flex; flex-direction:column;
  min-height:100dvh;
  overflow-x:hidden;
}

/* ── Header ───────────────────────────────────────────── */
header{
  flex-shrink:0;
  padding:clamp(12px,2vw,22px) clamp(14px,3vw,36px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  background:var(--bg2);
}
header h1{font-size:clamp(16px,3vw,22px);font-weight:800;letter-spacing:-.5px;}
header h1 span{color:var(--orange);}
header p{font-family:'DM Mono',monospace;font-size:clamp(9px,1.2vw,11px);color:var(--muted);line-height:1.5;}

/* ── Tab bar ──────────────────────────────────────────── */
.tabbar{
  flex-shrink:0;
  padding:10px clamp(10px,2vw,28px) 0;
  display:flex; gap:4px; flex-wrap:wrap;
  border-bottom:1px solid var(--border);
  background:var(--bg);
}
.tab{
  padding:5px clamp(8px,1.5vw,14px) 7px;
  border:1px solid var(--border); border-bottom:none;
  border-radius:6px 6px 0 0;
  background:var(--bg2); color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:clamp(10px,1.3vw,12px); font-weight:500;
  cursor:pointer; user-select:none;
  transition:color .15s,background .15s,border-color .15s;
  white-space:nowrap;
}
.tab:hover{color:var(--text); background:var(--bg3);}
.tab.active{background:var(--bg3);color:var(--orange);border-color:var(--border2);border-bottom-color:var(--bg3);}
.tab.modified{color:var(--green);}
.tab.modified.active{color:var(--green);}
.tab-sep{flex:1;}

/* ── Body layout ──────────────────────────────────────── */
.body{
  flex:1; min-height:0;
  display:grid;
  grid-template-columns: 1fr clamp(180px,22vw,240px);
  grid-template-rows:1fr;
  gap:0;
}
@media(max-width:640px){
  .body{grid-template-columns:1fr; grid-template-rows:1fr auto;}
}

/* ── Graph pane ───────────────────────────────────────── */
.graph-pane{
  min-width:0; min-height:0;
  padding:clamp(10px,2vw,20px);
  display:flex; flex-direction:column; gap:10px;
  overflow:hidden;
}
.graph-header{
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.graph-title{
  font-size:clamp(11px,1.5vw,13px); font-weight:700;
  letter-spacing:.8px; text-transform:uppercase; color:var(--orange);
  display:flex; align-items:center; gap:8px;
}
.graph-title::before{
  content:''; width:6px; height:6px; border-radius:50%;
  background:var(--orange); box-shadow:0 0 8px var(--orange);
  flex-shrink:0;
}
.badge{
  font-size:9px; padding:2px 7px; border-radius:10px;
  background:var(--green-dim); border:1px solid var(--green);
  color:var(--green); letter-spacing:.4px;
}
.nav-arrows{display:flex; gap:6px; margin-left:auto;}
.arr-btn{
  padding:5px 12px; border-radius:5px;
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text); font-family:'Syne',sans-serif;
  font-size:clamp(10px,1.3vw,12px); font-weight:700;
  cursor:pointer; transition:border-color .15s,background .15s;
  white-space:nowrap;
}
.arr-btn:hover{border-color:var(--border2);}
.arr-btn:disabled{opacity:.3;cursor:not-allowed;}

#svg-wrap{
  flex:1; min-height:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden;
}
#svg-wrap svg{
  display:block;
  width:100%; height:100%;
  max-width:100%; max-height:100%;
}
#svg-wrap .node-hit{cursor:pointer;}

/* ── Side panel ───────────────────────────────────────── */
.side{
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}
@media(max-width:640px){
  .side{border-left:none; border-top:1px solid var(--border); max-height:42vh; overflow-y:auto;}
}
.side-section{
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.side-section:last-child{border-bottom:none; flex:1; overflow:hidden; display:flex; flex-direction:column;}
.sec-title{
  font-family:'DM Mono',monospace;
  font-size:9px; font-weight:600; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--muted); margin-bottom:8px;
}

/* sel info */
.sel-info{
  font-family:'DM Mono',monospace;
  font-size:11px; color:var(--muted); line-height:1.6;
  min-height:30px; margin-bottom:8px;
}
.sel-info em{color:var(--text); font-style:normal;}
.ok{color:var(--green);} .ko{color:var(--red);}

/* buttons */
.btn-row{display:flex; gap:5px; margin-bottom:5px;}
.btn{
  flex:1; padding:7px 6px;
  border-radius:5px; border:1px solid var(--border2);
  background:var(--bg3); color:var(--text);
  font-family:'Syne',sans-serif;
  font-size:clamp(10px,1.2vw,11px); font-weight:600;
  cursor:pointer; white-space:nowrap;
  transition:background .15s,border-color .15s;
}
.btn:hover{background:var(--bg2); border-color:rgba(100,130,255,.4);}
.btn.primary{background:var(--green-dim); border-color:var(--green); color:var(--green);}
.btn.primary:hover{background:rgba(200,240,128,.25);}
.btn.primary:disabled{background:var(--bg3); border-color:var(--border); color:var(--muted); cursor:not-allowed;}
.btn.danger{border-color:var(--red); color:var(--red);}
.btn.danger:hover{background:rgba(240,112,112,.1);}
.btn.reset{border-color:var(--orange); color:var(--orange);}
.btn.reset:hover{background:rgba(255,107,53,.1);}
.btn.reset:disabled{border-color:var(--border); color:var(--muted); cursor:not-allowed;}

/* weight bars */
.weight-list{display:flex; flex-direction:column; gap:3px;}
.weight-row{display:flex; align-items:center; gap:6px;}
.wid{font-family:'DM Mono',monospace; font-size:9px; font-weight:500; width:16px; text-align:right; color:var(--muted); flex-shrink:0;}
.weight-row.r0 .wid{color:var(--orange);}
.weight-row.sel .wid{color:var(--green);}
.bar-track{flex:1; height:3px; background:var(--bg3); border-radius:2px; overflow:hidden;}
.bar-fill{height:100%; border-radius:2px; background:var(--blue); transition:width .35s ease;}
.weight-row.r0 .bar-fill{background:var(--orange);}
.weight-row.sel .bar-fill{background:var(--green);}
.wval{font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); width:36px; text-align:right; flex-shrink:0;}

/* history */
.hist-scroll{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:3px; scrollbar-width:thin;}
.hist-item{
  font-family:'DM Mono',monospace; font-size:10px;
  padding:5px 8px; border-radius:5px;
  border:1px solid var(--border); background:var(--bg3);
  cursor:pointer; color:var(--muted); line-height:1.4;
  transition:border-color .15s;
}
.hist-item:hover{border-color:var(--border2); color:var(--text);}
.hist-item.active{border-color:var(--green); color:var(--green);}
.hist-empty{font-family:'DM Mono',monospace; font-size:11px; color:var(--muted);}

/* toast */
#toast{
  position:fixed; bottom:16px; left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--green); color:#0a1a00;
  font-family:'DM Mono',monospace; font-size:11px;
  padding:7px 18px; border-radius:20px;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none; z-index:99; white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.err{background:var(--red); color:#fff;}

/* grid view */
.grid-pane{
  display:none;
  padding:clamp(10px,2vw,24px);
  overflow-y:auto;
}
.grid-pane.active{display:block;}
.grid-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr));
  gap:12px;
}
.grid-card{
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--r); padding:10px 10px 6px;
  cursor:pointer;
  transition:border-color .2s,transform .15s,box-shadow .15s;
}
.grid-card:hover{border-color:var(--border2); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.4);}
.grid-card.modified{border-color:rgba(200,240,128,.3);}
.gc-title{font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--orange); margin-bottom:6px;}
.gc-title .mod{color:var(--green); margin-left:4px;}
.grid-card svg{display:block; width:100%; height:auto; pointer-events:none;}
</style>
</head>
<body>

<header>
  <div>
    <h1>Arbres de <span>référence</span></h1>
  </div>
  <p>10 graphes · BFS depuis le sommet&nbsp;0<br>Cliquer les nœuds pour sélectionner · poids à 3&nbsp;décimales</p>
</header>

<div class="tabbar" id="tabbar">
  <button class="tab active" data-view="single" onclick="setView('single')">Détail</button>
  <button class="tab" data-view="grid" onclick="setView('grid')">Grille</button>
  <div class="tab-sep"></div>
  <button class="tab" id="gt0" onclick="showGraph(0)">1</button><button class="tab" id="gt1" onclick="showGraph(1)">2</button><button class="tab" id="gt2" onclick="showGraph(2)">3</button><button class="tab" id="gt3" onclick="showGraph(3)">4</button><button class="tab" id="gt4" onclick="showGraph(4)">5</button><button class="tab" id="gt5" onclick="showGraph(5)">6</button><button class="tab" id="gt6" onclick="showGraph(6)">7</button><button class="tab" id="gt7" onclick="showGraph(7)">8</button><button class="tab" id="gt8" onclick="showGraph(8)">9</button><button class="tab" id="gt9" onclick="showGraph(9)">10</button>
</div>

<!-- Single view -->
<div class="body" id="single-view">
  <div class="graph-pane">
    <div class="graph-header">
      <div class="graph-title" id="g-title">Arbre 1</div>
      <div class="nav-arrows">
        <button class="arr-btn" id="btn-prev" onclick="navigate(-1)">← Préc.</button>
        <button class="arr-btn" id="btn-next" onclick="navigate(1)">Suiv. →</button>
      </div>
    </div>
    <div id="svg-wrap"></div>
  </div>

  <div class="side">
    <!-- Op -->
    <div class="side-section">
      <div class="sec-title">Équilibrage</div>
      <div class="sel-info" id="sel-info">Cliquer les nœuds à sélectionner</div>
      <div class="btn-row">
        <button class="btn primary" id="btn-eq" onclick="lancerEq()" disabled>⊕ Équilibrer</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="toutSel()" style="font-size:10px">Tout</button>
        <button class="btn danger" onclick="desel()" style="font-size:10px">Effacer</button>
      </div>
      <div class="btn-row" style="margin-top:3px">
        <button class="btn reset" id="btn-reset" onclick="resetGraph()" disabled>↺ Réinitialiser</button>
      </div>
    </div>

    <!-- Poids -->
    <div class="side-section">
      <div class="sec-title">Poids</div>
      <div class="weight-list" id="weight-list"></div>
    </div>

    <!-- Historique -->
    <div class="side-section">
      <div class="sec-title">Historique <span id="hc" style="color:var(--green)"></span></div>
      <div class="hist-scroll" id="hl"><div class="hist-empty">—</div></div>
    </div>
  </div>
</div>

<!-- Grid view -->
<div class="grid-pane" id="grid-view">
  <div class="grid-grid" id="grid-grid"></div>
</div>

<div id="toast"></div>

<script>
const ADJS         = [[[1], [0, 2, 3, 9], [1, 4, 5], [1], [2, 6, 7], [2], [4, 8], [4], [6], [1]], [[1, 2, 6, 8], [0, 5], [0, 3, 4, 7], [2], [2], [1], [0], [2, 9], [0], [7]], [[1], [0, 2, 7], [1, 3, 4, 8], [2, 6], [2, 5], [4], [3], [1, 9], [2], [7]], [[1, 2, 4, 5, 6], [0], [0, 3], [2, 9], [0, 7], [0], [0], [4, 8], [7], [3]], [[1, 3], [0, 2, 7], [1], [0, 4, 6, 9], [3, 5], [4], [3], [1, 8], [7], [3]], [[1, 6], [0, 2, 3, 7], [1], [1, 4, 5], [3, 8], [3], [0], [1], [4, 9], [8]], [[1], [0, 2, 5, 8], [1, 3, 4], [2], [2, 6], [1, 7], [4], [5, 9], [1], [7]], [[1, 2, 3, 4, 6, 9], [0], [0], [0, 8], [0, 5], [4], [0, 7], [6], [3], [0]], [[1, 6], [0, 2], [1, 3, 8, 9], [2, 4, 7], [3, 5], [4], [0], [3], [2], [2]], [[1, 2], [0, 5], [0, 3, 4], [2, 6, 9], [2], [1, 7], [3], [5, 8], [7], [3]]];
const INIT_WEIGHTS = [[0.60193925, 0.11778924, 0.29038558, 0.33150994, 0.86097722, 0.08858666, 0.95295976, 0.98191878, 0.04233292, 0.59112776], [0.52938372, 0.40165975, 0.6752467, 0.03785684, 0.76063527, 0.89615105, 0.42284915, 0.8679761, 0.23982528, 0.7918118], [0.34147328, 0.07216437, 0.195939, 0.08315946, 0.21128749, 0.46778067, 0.71063835, 0.93030083, 0.00845359, 0.08882792], [0.2321495, 0.9503277, 0.4354662, 0.4298544, 0.37357369, 0.63148855, 0.0638736, 0.96852819, 0.25925731, 0.46783211], [0.54899232, 0.83604477, 0.62538456, 0.95764863, 0.74120694, 0.94236115, 0.4962786, 0.28492402, 0.03853266, 0.88819479], [0.77387211, 0.35732765, 0.05541534, 0.29165424, 0.01975864, 0.26630234, 0.57925369, 0.19796891, 0.5345943, 0.75967207], [0.47309582, 0.27772929, 0.36636434, 0.31840164, 0.73136236, 0.82308138, 0.86283913, 0.87492562, 0.06022679, 0.18133411], [0.64101017, 0.98248814, 0.9300435, 0.50740324, 0.0529961, 0.905559, 0.89393179, 0.08805582, 0.6443123, 0.92699574], [0.36837048, 0.0252017, 0.25532952, 0.28441342, 0.74977386, 0.84131124, 0.54582947, 0.95566181, 0.65647294, 0.64866688], [0.17445279, 0.40231371, 0.83622559, 0.91465498, 0.53520328, 0.26045658, 0.77107412, 0.26496792, 0.77343722, 0.18705712]];
const NG = 10, NN = 10;

const state = Array.from({length:NG}, (_,gi) => ({
  poids:     [...INIT_WEIGHTS[gi]],
  snapshots: [{poids:[...INIT_WEIGHTS[gi]]}],
  hist:      [], histIdx:-1,
  sel:       new Set(), changed: new Set()
}));

let cur=0, view='single';

/* ── BFS layout ─────────────────────────────────────────── */
function bfsTree(adj){
  const p=Array(NN).fill(-1),d=Array(NN).fill(-1),v=Array(NN).fill(false);
  const q=[0]; v[0]=true; d[0]=0;
  while(q.length){const u=q.shift();for(const w of adj[u])if(!v[w]){v[w]=true;p[w]=u;d[w]=d[u]+1;q.push(w);}}
  return {parent:p,depth:d};
}
function layoutTree(adj,parent,depth){
  const ch=Array.from({length:NN},()=>[]);
  for(let i=1;i<NN;i++)if(parent[i]>=0)ch[parent[i]].push(i);
  const lv=Array(NN).fill(0),ord=[],q=[0];
  while(q.length){const u=q.shift();ord.push(u);for(const c of ch[u])q.push(c);}
  for(let k=ord.length-1;k>=0;k--){const u=ord[k];lv[u]=ch[u].length?ch[u].reduce((s,c)=>s+lv[c],0):1;}
  const xp=Array(NN).fill(0),xs=Array(NN).fill(0);
  for(const u of ord){let cx=xs[u];for(const c of ch[u]){xs[c]=cx;cx+=lv[c];}xp[u]=xs[u]+(lv[u]-1)/2;}
  const md=Math.max(...depth.filter(d=>d>=0),0);
  return {xpos:xp,maxDepth:md,children:ch};
}

/* ── SVG builder ─────────────────────────────────────────── */
function buildSVG(gi, poids, sel, changed, W=560){
  const adj=ADJS[gi];
  const {parent,depth}=bfsTree(adj);
  const {xpos,maxDepth}=layoutTree(adj,parent,depth);
  const PAD=42, usable=W-2*PAD;
  const valid=Array.from({length:NN},(_,i)=>i).filter(i=>depth[i]>=0);
  const xs=valid.map(i=>xpos[i]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),span=Math.max(maxX-minX,1);
  const LH=Math.min(85,Math.max(55,Math.floor(380/Math.max(maxDepth,1))));
  const H=PAD+maxDepth*LH+52;
  const px=Array(NN).fill(0),py=Array(NN).fill(0);
  for(let i=0;i<NN;i++){
    if(depth[i]<0){px[i]=W/2;py[i]=H-28;continue;}
    px[i]=PAD+(xpos[i]-minX)/span*usable;
    py[i]=PAD+depth[i]*LH;
  }
  const iso=Array.from({length:NN},(_,i)=>i).filter(i=>depth[i]<0);
  if(iso.length){const iw=usable/(iso.length+1);iso.forEach((nd,k)=>{px[nd]=PAD+iw*(k+1);py[nd]=H-28;});}
  const R=17;
  let s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  // edges
  for(let i=1;i<NN;i++){
    if(parent[i]<0)continue;
    const p=parent[i], se=sel.has(i)&&sel.has(p);
    s+=`<line x1="${px[p].toFixed(1)}" y1="${py[p].toFixed(1)}" x2="${px[i].toFixed(1)}" y2="${py[i].toFixed(1)}" stroke="${se?'#ff6b35':'#3a3f5c'}" stroke-width="${se?2:1.4}" stroke-linecap="round"/>`;
  }
  // nodes
  for(let i=0;i<NN;i++){
    const isR=i===0,isSel=sel.has(i),isCh=changed.has(i);
    let fill,stroke,idC,wC;
    if(isR){fill='#ff6b35';stroke='#ff6b35';idC='#fff';wC='#ffe0d0';}
    else if(isSel){fill='#1a3a20';stroke='#c8f080';idC='#c8f080';wC='#90c050';}
    else if(isCh){fill='#0e2235';stroke='#80d0ff';idC='#80c0f0';wC='#4a90d9';}
    else{fill='#1e2235';stroke='#4a90d9';idC='#c8d8f0';wC='#7aaed4';}
    const pv=poids[i].toFixed(3);
    if(isR)s+=`<circle cx="${px[i].toFixed(1)}" cy="${py[i].toFixed(1)}" r="${R+6}" fill="none" stroke="#ff6b3540" stroke-width="2"/>`;
    if(isSel)s+=`<circle cx="${px[i].toFixed(1)}" cy="${py[i].toFixed(1)}" r="${R+5}" fill="none" stroke="#c8f08030" stroke-width="1.5"/>`;
    s+=`<circle cx="${px[i].toFixed(1)}" cy="${py[i].toFixed(1)}" r="${R}" fill="${fill}" stroke="${stroke}" stroke-width="${isR||isSel?2:1}"/>`;
    s+=`<text x="${px[i].toFixed(1)}" y="${(py[i]-4).toFixed(1)}" font-family="DM Mono,monospace" font-size="11" font-weight="600" fill="${idC}" text-anchor="middle" dominant-baseline="central">${i}</text>`;
    s+=`<text x="${px[i].toFixed(1)}" y="${(py[i]+8).toFixed(1)}" font-family="DM Mono,monospace" font-size="8" fill="${wC}" text-anchor="middle" dominant-baseline="central">${pv}</text>`;
    s+=`<circle cx="${px[i].toFixed(1)}" cy="${py[i].toFixed(1)}" r="${R}" fill="transparent" class="node-hit" data-node="${i}" style="cursor:pointer"/>`;
  }
  s+=`</svg>`;
  return s;
}

/* ── Connexité ──────────────────────────────────────────── */
function connexe(gi,arr){
  if(!arr.length)return true;
  const adj=ADJS[gi],st=new Set(arr),vis=new Set();
  const dfs=u=>{if(vis.has(u))return;vis.add(u);for(const v of adj[u])if(st.has(v))dfs(v);};
  dfs(arr[0]); return vis.size===st.size;
}

/* ── Render ─────────────────────────────────────────────── */
function render(){
  const S=state[cur];
  const svgH=buildSVG(cur,S.poids,S.sel,S.changed);
  document.getElementById('svg-wrap').innerHTML=svgH;
  document.querySelectorAll('.node-hit').forEach(el=>
    el.addEventListener('click',()=>toggleNode(parseInt(el.dataset.node)))
  );
  const isModif=S.hist.length>0&&S.histIdx>=0;
  document.getElementById('g-title').innerHTML=
    `Arbre ${cur+1}${isModif?' <span class="badge">modifié</span>':''}`;
  // tabs
  for(let i=0;i<NG;i++){
    const t=document.getElementById(`gt${i}`);
    const sm=state[i], mod=sm.hist.length>0&&sm.histIdx>=0;
    t.classList.toggle('active',i===cur);
    t.classList.toggle('modified',mod&&i!==cur);
  }
  // nav
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===NG-1;
  document.getElementById('btn-reset').disabled=!(S.hist.length>0||S.histIdx>=0);
  renderWeights(); renderHist(); updSel();
  // refresh grid if open
  if(view==='grid') buildGrid();
}

function renderWeights(){
  const S=state[cur],ws=S.poids,mx=Math.max(...ws);
  document.getElementById('weight-list').innerHTML=ws.map((w,i)=>
    `<div class="weight-row ${i===0?'r0':''} ${S.sel.has(i)?'sel':''}">
      <span class="wid">${i}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(w/mx*100).toFixed(1)}%"></div></div>
      <span class="wval">${w.toFixed(3)}</span>
    </div>`).join('');
}

function renderHist(){
  const S=state[cur],el=document.getElementById('hl'),cnt=document.getElementById('hc');
  if(!S.hist.length){el.innerHTML='<div class="hist-empty">—</div>';cnt.textContent='';return;}
  cnt.textContent=`(${S.hist.length})`;
  let h=`<div class="hist-item ${S.histIdx===-1?'active':''}" onclick="allerInitial()">État initial</div>`;
  S.hist.forEach((op,i)=>h+=`<div class="hist-item ${S.histIdx===i?'active':''}" onclick="allerAEtat(${i})">#${i+1} [${op.sommets.join(',')}] → ${op.moy}</div>`);
  el.innerHTML=h;
  el.querySelector('.active')?.scrollIntoView({block:'nearest'});
}

function updSel(){
  const S=state[cur],el=document.getElementById('sel-info'),btn=document.getElementById('btn-eq');
  if(!S.sel.size){el.innerHTML='Cliquer les nœuds à sélectionner';btn.disabled=true;return;}
  const a=[...S.sel].sort((a,b)=>a-b),cx=connexe(cur,a);
  const m=(a.reduce((s,i)=>s+S.poids[i],0)/a.length).toFixed(4);
  el.innerHTML=`<em>[${a.join(', ')}]</em><br>Moy : <em>${m}</em> ${cx?'<span class="ok">✓</span>':'<span class="ko">✗ non connexe</span>'}`;
  btn.disabled=!cx;
}

/* ── Actions ────────────────────────────────────────────── */
function toggleNode(i){const S=state[cur];S.sel.has(i)?S.sel.delete(i):S.sel.add(i);render();}
function toutSel(){state[cur].sel=new Set(Array.from({length:NN},(_,i)=>i));render();}
function desel(){state[cur].sel=new Set();render();}

function lancerEq(){
  const S=state[cur];
  const a=[...S.sel].sort((a,b)=>a-b);
  if(!a.length||!connexe(cur,a)){toast('Non connexe — annulé',true);return;}
  const m=Math.round(a.reduce((s,i)=>s+S.poids[i],0)/a.length*1e5)/1e5;
  const np=[...S.poids]; a.forEach(i=>np[i]=m);
  if(S.histIdx<S.hist.length-1){S.hist=S.hist.slice(0,S.histIdx+1);S.snapshots=S.snapshots.slice(0,S.histIdx+2);}
  S.hist.push({sommets:[...a],moy:m.toFixed(4)});
  S.snapshots.push({poids:[...np]});
  S.histIdx=S.hist.length-1;
  S.changed=new Set(a); S.poids=[...np]; S.sel=new Set();
  toast(`[${a.join(',')}] → ${m.toFixed(4)}`);
  render();
}

function allerAEtat(i){
  const S=state[cur];
  S.histIdx=i; S.poids=[...S.snapshots[i+1].poids];
  S.sel=new Set(); S.changed=new Set(); render();
}
function allerInitial(){
  const S=state[cur];
  S.histIdx=-1; S.poids=[...S.snapshots[0].poids];
  S.sel=new Set(); S.changed=new Set(); render();
}
function resetGraph(){
  const S=state[cur];
  S.poids=[...INIT_WEIGHTS[cur]];
  S.snapshots=[{poids:[...INIT_WEIGHTS[cur]]}];
  S.hist=[]; S.histIdx=-1; S.sel=new Set(); S.changed=new Set();
  toast('Arbre réinitialisé ↺'); render();
}

function showGraph(i){cur=i;render();}
function navigate(d){showGraph(Math.max(0,Math.min(NG-1,cur+d)));}

/* ── View switch ────────────────────────────────────────── */
function setView(v){
  view=v;
  document.querySelectorAll('[data-view]').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  document.getElementById('single-view').style.display=v==='single'?'':'none';
  document.getElementById('grid-view').classList.toggle('active',v==='grid');
  if(v==='grid')buildGrid();
}

function buildGrid(){
  document.getElementById('grid-grid').innerHTML=Array.from({length:NG},(_,i)=>{
    const S=state[i], mod=S.hist.length>0&&S.histIdx>=0;
    const svg=buildSVG(i,S.poids,new Set(),S.changed,320);
    return`<div class="grid-card ${mod?'modified':''}" onclick="setView('single');showGraph(${i})">
      <div class="gc-title">Arbre ${i+1}${mod?'<span class="mod">●</span>':''}</div>${svg}</div>`;
  }).join('');
}

/* ── Toast ──────────────────────────────────────────────── */
let toastT;
function toast(m,err=false){
  const t=document.getElementById('toast');
  t.textContent=m; t.className=err?'err show':'show';
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='',2800);
}

/* ── Boot ───────────────────────────────────────────────── */
document.getElementById('gt0').classList.add('active');
render();

/* responsive: SVG wrap fills available height */
function fitLayout(){
  const sv=document.getElementById('single-view');
  const h=window.innerHeight - document.querySelector('header').offsetHeight
                             - document.querySelector('.tabbar').offsetHeight;
  if(sv) sv.style.height=h+'px';
}
window.addEventListener('resize',()=>{fitLayout();render();});
fitLayout();
</script>
</body>
